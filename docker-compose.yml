version: "3"

services:

  mongodb:
    image: mongo
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"

  backend:
    image: manisha0925/backend
    container_name: backend
    restart: always
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017/ddtask
    ports:
      - "8080:8080"

  frontend:
    image: manisha0925/frontend
    container_name: frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"
